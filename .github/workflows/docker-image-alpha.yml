# ============================================================================
# new-api Alpha Docker Build Workflow (QuantumNous)
# 全部使用 self-hosted runner 构建
# - amd64: 原生构建
# - arm64: 通过 Docker QEMU 在 self-hosted (amd64) 上仿真构建
# 触发条件: 推送 alpha tag（如 v0.10.8-alpha.3）或手动触发
# ============================================================================

name: Publish Docker image (alpha)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+-alpha*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to build (e.g., v0.10.8-alpha.3)"
        required: true
        type: string

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/newapi-fix

concurrency:
  group: docker-alpha-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Step 1: 多架构构建（amd64 原生 + arm64 QEMU 仿真），全部跑在 self-hosted
  # ==========================================================================
  build:
    name: Build & push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    runs-on: self-hosted
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && 0 || 1 }}
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag & write VERSION
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "::error::Tag '$TAG' does not exist in the repository"
              exit 1
            fi
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "$TAG" > VERSION
          echo "Building tag: $TAG for ${{ matrix.arch }}"

      # arm64 构建需要 QEMU 仿真（self-hosted 为 amd64 机器）
      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME }}

      - name: Build & push single-arch image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.TAG }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:alpha-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        run: cosign sign --yes ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Output digest
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ env.IMAGE_NAME }}:${{ env.TAG }}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Step 2: 合并多架构 manifest
  # ==========================================================================
  create_manifests:
    name: Create multi-arch manifests
    needs: [build]
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      packages: write
      contents: read
    steps:
      - name: Extract tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push manifest (version tag)
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_NAME }}:${TAG} \
            ${{ env.IMAGE_NAME }}:${TAG}-amd64 \
            ${{ env.IMAGE_NAME }}:${TAG}-arm64

      - name: Create & push manifest (alpha tag)
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_NAME }}:alpha \
            ${{ env.IMAGE_NAME }}:alpha-amd64 \
            ${{ env.IMAGE_NAME }}:alpha-arm64

      - name: Output manifest digest
        run: |
          echo "### Multi-arch Manifest Digests" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ env.IMAGE_NAME }}:${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.IMAGE_NAME }}:alpha" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${TAG} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
